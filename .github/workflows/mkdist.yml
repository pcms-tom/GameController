name: Make Distribution

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os:
          - macos-latest
          - ubuntu-22.04
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - if: ${{ matrix.os == 'macos-latest' }}
        run: |
          rustup target add aarch64-apple-darwin x86_64-apple-darwin
          dist/mkdist-macos ${{ github.ref_name }}
      - if: ${{ matrix.os == 'ubuntu-22.04' }}
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libayatana-appindicator3-dev libclang-dev librsvg2-dev libwebkit2gtk-4.1-dev libxdo-dev
          dist/mkdist-linux ${{ github.ref_name }}
      - if: ${{ matrix.os == 'windows-latest' }}
        run: |
          dist/mkdist-windows.ps1 ${{ github.ref_name }}
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: |
            dist/*.dmg
            dist/*.tar.bz2
            dist/*.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist-artifacts
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          mapfile -d '' files < <(find dist-artifacts -type f \( -name '*.dmg' -o -name '*.tar.bz2' -o -name '*.zip' \) -print0)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No distribution files found."
            exit 1
          fi

          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || \
            gh release create "${GITHUB_REF_NAME}" --verify-tag --title "${GITHUB_REF_NAME}" --notes "Automated release for ${GITHUB_REF_NAME}."

          gh release upload "${GITHUB_REF_NAME}" "${files[@]}" --clobber
